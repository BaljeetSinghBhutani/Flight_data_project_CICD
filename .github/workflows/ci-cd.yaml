name: Flight Booking CICD

on:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read
  id-token: write

jobs:
  upload_to_dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Authenticate to Google Cloud using Workload Identity Federation
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # Install Google Cloud SDK
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # Upload variables.json to GCS
      - name: Upload Variable JSON to GCS
        run: |
          gsutil cp Variables/dev/variables.json gs://us-central1-airflow-dev-b4e2669c-bucket/data/dev/variables.json

      # Import Variables into Airflow DEV
      - name: Import Variables into Airflow DEV
        run: |
          gcloud composer environments run airflow-dev \
            --location us-central1 \
            variables import -- /home/airflow/gcs/data/dev/variables.json

      # Upload Spark Job
      - name: Upload Spark Job to GCS
        run: |
          gsutil cp spark_job/spark_transformation_job.py \
            gs://airflow-projects-gsd/airflow-project-1/spark-job/

      # Upload DAG
      - name: Upload Airflow DAG to DEV
        run: |
          gcloud composer environments storage dags import \
            --environment airflow-dev \
            --location us-central1\
            --source airflow_job/airflow_job.py

  upload_to_prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Authenticate to Google Cloud using Workload Identity Federation
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # Install Google Cloud SDK
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # Upload variables.json to GCS
      - name: Upload Variable JSON to GCS
        run: |
          gsutil cp Variables/prod/variables.json gs://us-central1-airflow-prod-8056d480-bucket/data/prod/variables.json

      # Import Variables into Airflow PROD
      - name: Import Variables into Airflow PROD
        run: |
          gcloud composer environments run airflow-prod \
            --location us-central1\
            variables import -- /home/airflow/gcs/data/prod/variables.json

      # Upload Spark Job
      - name: Upload Spark Job to GCS
        run: |
          gsutil cp spark_job/spark_transformation_job.py \
            gs://airflow-projects-gsd/airflow-project-1/spark-job/

      # Upload DAG
      - name: Upload Airflow DAG to PROD
        run: |
          gcloud composer environments storage dags import \
            --environment airflow-prod \
            --location us-central1\
            --source airflow_job/airflow_job.py